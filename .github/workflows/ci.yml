name: CI

on:
  push:
    branches:
      - main
      - release/**

  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - release/**

  workflow_dispatch:
    inputs:
      run_diagnostics:
        description: Run non-blocking performance diagnostic tiers
        required: false
        default: "false"

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "true"
  DOTNET_VERSION: 10.0.x
  TEST_PROJECT: ".\\SharpClaw.Tests\\SharpClaw.Tests.csproj"

permissions:
  contents: read

jobs:
  correctness_tests:
    name: Correctness Tests
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        shell: pwsh
        run: dotnet restore $env:TEST_PROJECT

      - name: Run correctness suite
        shell: pwsh
        run: >
          dotnet test $env:TEST_PROJECT
          --configuration Release
          --no-restore
          --logger GitHubActions
          --filter "TestCategory!=PerformanceDiagnostic&TestCategory!=PerformanceGate"

  performance_gates:
    name: Performance Gates
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        shell: pwsh
        run: dotnet restore $env:TEST_PROJECT

      # Require this check in GitHub branch protection. It is the blocking
      # performance signal; diagnostic tiers below are for manual analysis.
      - name: Run performance gates
        shell: pwsh
        run: >
          dotnet test $env:TEST_PROJECT
          --configuration Release
          --no-restore
          --logger GitHubActions
          --filter "TestCategory=PerformanceGate"

  performance_diagnostics:
    name: Performance Diagnostics
    if: github.event_name == 'workflow_dispatch' && inputs.run_diagnostics == 'true'
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        shell: pwsh
        run: dotnet restore $env:TEST_PROJECT

      - name: Run diagnostic tiers
        shell: pwsh
        env:
          SHARPCLAW_RUN_PERF_DIAGNOSTICS: "1"
        run: >
          dotnet test $env:TEST_PROJECT
          --configuration Release
          --no-restore
          --logger GitHubActions
          --filter "TestCategory=PerformanceDiagnostic"
