name: CI

on:
  push:
    branches:
      - main
      - release/**

  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - release/**

  workflow_dispatch:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "true"
  DOTNET_VERSION: 10.0.x
  TEST_PROJECT: ".\\SharpClaw.Tests\\SharpClaw.Tests.csproj"

permissions:
  contents: read

jobs:
  correctness:
    name: Correctness / ${{ matrix.domain }}
    runs-on: windows-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - domain: Core
            filter: 'FullyQualifiedName~SharpClaw.Tests.AppInfoTests|FullyQualifiedName~SharpClaw.Tests.Api|FullyQualifiedName~SharpClaw.Tests.Architecture|FullyQualifiedName~SharpClaw.Tests.Clients|FullyQualifiedName~SharpClaw.Tests.Modules|FullyQualifiedName~SharpClaw.Tests.Services'
          - domain: CLI Commands
            filter: 'FullyQualifiedName~SharpClaw.Tests.Cli.ChannelCliCommandTests'
          - domain: CLI REPL
            filter: 'FullyQualifiedName~SharpClaw.Tests.Cli.CliReplSmokeTests'
          - domain: Gateway
            filter: 'FullyQualifiedName~SharpClaw.Tests.Gateway|FullyQualifiedName~TestHarnessApiGatewaySurfaceTests'
          - domain: Frontend
            filter: 'FullyQualifiedName~SharpClaw.Tests.Frontend'
          - domain: Persistence
            filter: 'FullyQualifiedName~SharpClaw.Tests.Persistence'
          - domain: Providers
            filter: 'FullyQualifiedName~SharpClaw.Tests.Providers'
          - domain: Tasks
            filter: 'FullyQualifiedName~SharpClaw.Tests.Tasks'
          - domain: Chat
            filter: 'FullyQualifiedName~TestHarnessChatPipelineTests|FullyQualifiedName~TestHarnessPromptAssemblyExpandedTests|FullyQualifiedName~TestHarnessStreamingCorrectnessTests'
          - domain: Jobs
            filter: 'FullyQualifiedName~DirectJob|FullyQualifiedName~LongRunningDirectJob|FullyQualifiedName~DirectStreamingJob'
          - domain: Tools
            filter: 'FullyQualifiedName~TestHarnessToolCorrectnessExpandedTests|FullyQualifiedName~TestHarnessRepeatedToolInteractionTests'
          - domain: Costs
            filter: 'FullyQualifiedName~JobCostIsNonNull|FullyQualifiedName~FailedJobCostBehavior|FullyQualifiedName~StreamingCostReportedOnlyAtEnd|FullyQualifiedName~MultipleAgentsInOneChannelDoNotCrossContaminateCosts|FullyQualifiedName~CustomModuleCostHookAddsUsage'
          - domain: Cache
            filter: 'FullyQualifiedName~TestHarnessCacheBehaviorTests'
          - domain: Agent Orchestration
            filter: 'FullyQualifiedName~TestHarnessAgentOrchestrationExpandedTests'
          - domain: Defaults
            filter: 'FullyQualifiedName~TestHarnessDefaultsAndResourcesTests'
          - domain: Module Contracts
            filter: 'FullyQualifiedName~TestHarnessModuleTests|FullyQualifiedName~TestHarnessArchitectureTests'
          - domain: Provider Registration
            filter: 'FullyQualifiedName~TestHarnessProviderRegistrationTests'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        shell: pwsh
        run: dotnet restore $env:TEST_PROJECT

      - name: Run correctness domain
        shell: pwsh
        run: >
          dotnet test $env:TEST_PROJECT
          --configuration Release
          --no-restore
          --logger GitHubActions
          --filter "TestCategory!=PerformanceDiagnostic&TestCategory!=PerformanceGate&(${{ matrix.filter }})"

  performance:
    name: Performance / ${{ matrix.domain }}
    runs-on: windows-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - domain: Streaming
            filter: 'FullyQualifiedName~PerformanceGate_StreamingOverhead|FullyQualifiedName~PerformanceGate_TenConcurrentStreams'
          - domain: Chat Throughput
            filter: 'FullyQualifiedName~PerformanceGate_NonStreamingOverhead|FullyQualifiedName~PerformanceGate_FiftyConcurrentShortChats|FullyQualifiedName~PerformanceGate_OneHundredSequentialWarmCacheChats'
          - domain: Jobs
            filter: 'FullyQualifiedName~PerformanceGate_DirectJob'
          - domain: Tools
            filter: 'FullyQualifiedName~PerformanceGate_InlineToolPermissionCheck|FullyQualifiedName~PerformanceGate_ProviderStream'
          - domain: Cache and Resolution
            filter: 'FullyQualifiedName~PerformanceGate_AccessibleThreads|FullyQualifiedName~PerformanceGate_PromptAssembly|FullyQualifiedName~PerformanceGate_CostLookup|FullyQualifiedName~PerformanceGate_ProviderResolution|FullyQualifiedName~PerformanceGate_ColdChatAfterCacheClear'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        shell: pwsh
        run: dotnet restore $env:TEST_PROJECT

      # Require this check in GitHub branch protection. It is the blocking
      # performance signal; diagnostic tiers remain local opt-in tests.
      - name: Run performance domain
        shell: pwsh
        run: >
          dotnet test $env:TEST_PROJECT
          --configuration Release
          --no-restore
          --logger GitHubActions
          --filter "TestCategory=PerformanceGate&(${{ matrix.filter }})"
